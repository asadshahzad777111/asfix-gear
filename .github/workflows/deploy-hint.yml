# Manual deploy reminder — does NOT deploy by itself.
# Run from GitHub Actions → Deploy hint (manual). Not triggered on push.
# Connect Render deploy hook URL as a repository secret when ready:
#   RENDER_DEPLOY_HOOK=https://api.render.com/deploy/srv-...
name: Deploy hint (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: render
        type: choice
        options:
          - render
          - vercel-frontend-only
          - railway

jobs:
  deploy-checklist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Pre-deploy checklist
        run: |
          echo "=== AsFix & Gear — Pre-deploy checklist ==="
          echo "1. npm run install:all && npm run seed && npm run build (local)"
          echo "2. Render build: npm run install:all && npm run seed && npm run build --prefix frontend"
          echo "3. Render start: NODE_ENV=production node backend/server.js"
          echo "4. Update shop address/phone in frontend/src/config/shop.js if needed"
          echo "5. Custom domain: Render dashboard → Domains → DNS CNAME"
          echo ""
          echo "Full guide: DEPLOY.md"
          node scripts/check-i18n.js
          npm run install:all
          npm run build

      - name: Optional Render deploy hook
        if: inputs.target == 'render'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -sf -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK secret not set — skipping live deploy."
            echo "Add it in GitHub → Settings → Secrets when Render gives you a deploy hook URL."
          fi

      - name: Non-Render target selected
        if: inputs.target != 'render'
        run: |
          echo "Target: ${{ inputs.target }}"
          echo "No automated deploy hook for this target — follow DEPLOY.md manually."
